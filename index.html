<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Modern Calculator | Premium Design</title>
    <meta name="description"
        content="A premium, glassmorphic calculator built with HTML, CSS, and JS. Features smooth animations and intuitive interface.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="mouse-glow" id="mouse-glow"></div>
        <div class="fireflies" id="fireflies"></div>
    </div>

    <main class="calculator-container">
        <div class="calculator" id="calculator">
            <div class="display">
                   <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="mode-selector">
                <button class="toggle-btn" id="mode-toggle">Switch to Scientific Mode</button>
            </div>
    
            <div class="scientific-grid sci-feature">
                <button class="sci-btn" data-sci-function="sin">sin</button>
                <button class="sci-btn" data-sci-function="cos">cos</button>
                <button class="sci-btn" data-sci-function="tan">tan</button>
                     <button class="sci-btn" data-sci-function="sqrt">√</button>
                      <button class="sci-btn" data-sci-function="log">log</button>
                <button class="sci-btn" data-sci-function="ln">ln</button>
                <button class="sci-btn" data-sci-function="pow">x<sup>y</sup></button>
                <button class="sci-btn" data-sci-function="pi">π</button>
            </div>

       
            <div class="buttons" id="buttons-grid">
                <button class="control-btn" data-all-clear>AC</button>
                
                <button class="control-btn" data-delete>DEL</button>
                <button class="operator-btn" data-operation="÷">÷</button>
                <button class="operator-btn" data-operation="×">×</button>
                

                <button class="number-btn" data-number>7</button>
                <button class="number-btn" data-number>8</button>
                <button class="number-btn" data-number>9</button>
                <button class="operator-btn" data-operation="-">−</button>

                <button class="number-btn" data-number>4</button>
                <button class="number-btn" data-number>5</button>
                
                 <button class="number-btn" data-number>6</button>
                         <button class="operator-btn" data-operation="+">+</button>

                     <button class="number-btn" data-number>1</button>
                    <button class="number-btn" data-number>2</button>
                    <button class="number-btn" data-number>3</button>
                
                        <button class="number-btn" data-number>.</button>

                    <button class="span-two number-btn" data-number>0</button>
                <button class="span-two equals-btn" data-equals>=</button>
                
            </div>
        </div>
    </main>

    <footer class="footer">
        <p class="footer-text">
            <span>Hi</span>
            <span>my</span>
            <span>name</span>
            <span>is </span>
            <span class="highlight">Indrajit</span>
            <span class="highlight">Bhowmick</span>
        </p>
        <a href="https://github.com/IndrajitOD/Simple-Calculator.git" class="github-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                </path>
            </svg>
            GitHub
        </a>
    </footer>

    <script src="script.js"></script>
</body>

</html>
